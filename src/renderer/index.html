<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Job-AI</title>
  <link rel="stylesheet" href="styles.css">
  <script>document.documentElement.dataset.os = (window.api && window.api.platform) || '';</script>
</head>
<body>
  <div class="titlebar">
    <span class="titlebar-brand">Job-AI</span>
    <nav class="menubar" id="menubar">
      <div class="menu">
        <button class="menu-label">File</button>
        <div class="menu-pop">
          <button data-action="quit">Exit</button>
        </div>
      </div>
      <div class="menu">
        <button class="menu-label">Edit</button>
        <div class="menu-pop">
          <button data-action="undo">Undo</button>
          <button data-action="redo">Redo</button>
          <hr>
          <button data-action="cut">Cut</button>
          <button data-action="copy">Copy</button>
          <button data-action="paste">Paste</button>
          <button data-action="selectAll">Select All</button>
        </div>
      </div>
      <div class="menu">
        <button class="menu-label">View</button>
        <div class="menu-pop">
          <button data-action="reload">Reload</button>
          <button data-action="fullscreen">Toggle Full Screen</button>
          <hr>
          <button data-action="zoomIn">Zoom In</button>
          <button data-action="zoomOut">Zoom Out</button>
          <button data-action="zoomReset">Actual Size</button>
          <hr>
          <button data-action="toggleDevTools">Toggle Developer Tools</button>
        </div>
      </div>
      <div class="menu">
        <button class="menu-label">Window</button>
        <div class="menu-pop">
          <button data-action="minimize">Minimize</button>
          <button data-action="close">Close</button>
        </div>
      </div>
      <div class="menu">
        <button class="menu-label">About</button>
        <div class="menu-pop">
          <button data-action="about">About Job-AI</button>
        </div>
      </div>
    </nav>
  </div>
  <header class="topnav">
    <div class="topnav-brand"><span class="tn-badge"></span><span class="tn-name">Job-AI</span></div>
    <ul id="nav" class="topnav-tabs">
      <li data-view="dashboard" class="tab active">Dashboard</li>
      <li data-view="tracker" class="tab">Tracker</li>
      <li data-view="analytics" class="tab">Analytics</li>
    </ul>
    <div class="topnav-right">
      <div class="setup-menu" id="setup-menu">
        <button class="setup-label" id="setup-label">Setup <span class="setup-chev">&#9662;</span></button>
        <div class="setup-pop" id="setup-pop">
          <div class="setup-h">Set up once</div>
          <ul id="nav-setup">
            <li data-view="personal" class="setup-item"><span class="nav-num">1</span>Personal Details</li>
            <li data-view="cvs" class="setup-item"><span class="nav-num">2</span>CVs</li>
            <li data-view="search" class="setup-item"><span class="nav-num">3</span>Search Preferences</li>
            <li data-view="license" class="setup-item"><span class="nav-num">4</span>License</li>
          </ul>
        </div>
      </div>
      <span class="tn-chip" id="tn-status" style="display:none"></span>
      <button class="tn-help" data-view="help" title="Help">?</button>
    </div>
  </header>
  <div id="expiry-banner"></div>
  <main id="content"></main>
  <footer class="app-footer">Job-AI · Apply to jobs while you sleep</footer>
  <script src="app.js"></script>
  <script>
    // Wire the custom title-bar menu (click to open, hover to switch, click-away to close)
    (function () {
      var menubar = document.getElementById('menubar');
      if (!menubar) return;
      var open = null;
      function closeAll() { if (open) { open.classList.remove('open'); open = null; } }
      menubar.querySelectorAll('.menu').forEach(function (menu) {
        var label = menu.querySelector('.menu-label');
        label.addEventListener('click', function (e) {
          e.stopPropagation();
          var wasOpen = menu === open;
          closeAll();
          if (!wasOpen) { menu.classList.add('open'); open = menu; }
        });
        label.addEventListener('mouseenter', function () {
          if (open && open !== menu) { closeAll(); menu.classList.add('open'); open = menu; }
        });
      });
      menubar.querySelectorAll('.menu-pop button[data-action]').forEach(function (btn) {
        btn.addEventListener('click', function (e) {
          e.stopPropagation();
          if (window.api && window.api.win) window.api.win.action(btn.dataset.action);
          closeAll();
        });
      });
      document.addEventListener('click', closeAll);
    })();

    // Top-nav "Setup" dropdown (click to open, click-away or select to close)
    (function () {
      var menu = document.getElementById('setup-menu');
      var label = document.getElementById('setup-label');
      if (!menu || !label) return;
      label.addEventListener('click', function (e) {
        e.stopPropagation();
        menu.classList.toggle('open');
      });
      document.getElementById('setup-pop').addEventListener('click', function () {
        menu.classList.remove('open');
      });
      document.addEventListener('click', function () { menu.classList.remove('open'); });
    })();
  </script>
</body>
</html>
