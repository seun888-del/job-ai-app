name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Download Playwright browsers
        run: npx playwright install chromium

      - name: Copy browsers to playwright-browsers
        run: |
          $src = "$env:USERPROFILE\AppData\Local\ms-playwright"
          $dst = "playwright-browsers"
          New-Item -ItemType Directory -Force -Path $dst | Out-Null
          Copy-Item -Recurse -Force "$src\*" "$dst\"

      - name: Inject secrets
        run: |
          $utf8 = [System.Text.UTF8Encoding]::new($false)
          $f = "bot\config.js"
          [System.IO.File]::WriteAllText((Resolve-Path $f), ((Get-Content -Raw $f) -replace '__CAPSOLVER_KEY__', '${{ secrets.CAPSOLVER_KEY }}'), $utf8)
          $f = "bot\modules\browser_launcher.js"
          [System.IO.File]::WriteAllText((Resolve-Path $f), ((Get-Content -Raw $f) -replace '__PROXY_URL__', '${{ secrets.PROXY_URL }}'), $utf8)
        shell: pwsh

      - name: Build Windows installer
        run: npm run dist

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: JobBot-Windows
          path: |
            dist/*.exe
            dist/latest.yml

  build-mac:
    runs-on: macos-latest
    # Cap the Mac job so signing/notarization can never hang indefinitely. If it
    # exceeds this it fails, and the decoupled release still ships Windows.
    # Budget: ~6 min signed build + concurrent notarization (up to 25 min/DMG wait).
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Download Playwright browsers
        run: npx playwright install chromium

      - name: Copy browsers to playwright-browsers
        run: |
          src="$HOME/Library/Caches/ms-playwright"
          dst="playwright-browsers"
          mkdir -p "$dst"
          cp -R "$src/." "$dst/"

      - name: Inject secrets
        run: |
          sed -i '' 's/__CAPSOLVER_KEY__/${{ secrets.CAPSOLVER_KEY }}/g' bot/config.js
          sed -i '' 's|__PROXY_URL__|${{ secrets.PROXY_URL }}|g' bot/modules/browser_launcher.js

      - name: Ensure icon is 512x512
        run: sips -z 512 512 assets/icon.png --out assets/icon.png

      - name: Build Mac DMG
        run: |
          if [ -n "${{ secrets.MAC_CSC_LINK }}" ]; then
            echo "Developer ID cert found — signing (notarization runs as the next explicit step)"
            export CSC_LINK="${{ secrets.MAC_CSC_LINK }}"
            export CSC_KEY_PASSWORD="${{ secrets.MAC_CSC_KEY_PASSWORD }}"
            export APPLE_ID="${{ secrets.APPLE_ID }}"
            export APPLE_APP_SPECIFIC_PASSWORD="${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}"
            export APPLE_TEAM_ID="${{ secrets.APPLE_TEAM_ID }}"
            echo "signing start: $(date -u +%T)"
            npm run dist:mac -- \
              -c.mac.hardenedRuntime=true \
              -c.mac.entitlements=build/entitlements.mac.plist \
              -c.mac.entitlementsInherit=build/entitlements.mac.plist \
              -c.mac.notarize=false
            echo "signing done: $(date -u +%T)"
          else
            echo "No Developer ID cert — building ad-hoc (unsigned), same as before"
            CSC_IDENTITY_AUTO_DISCOVERY=false npm run dist:mac
          fi

      # Explicit notarization: electron-builder's built-in (-c.mac.notarize=true)
      # uploads silently with no timeout and hung every build for 30+ min.
      # notarytool prints progress, enforces a hard timeout, and on rejection we
      # fetch Apple's log so the reason lands in CI output. Best-effort: if the
      # notary service is down we still ship SIGNED DMGs (continue-on-error).
      - name: Notarize + staple Mac DMGs
        continue-on-error: true
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -z "$APPLE_ID" ]; then
            echo "No Apple credentials — skipping notarization"
            exit 0
          fi
          set +e
          CREDS="--apple-id $APPLE_ID --password $APPLE_APP_SPECIFIC_PASSWORD --team-id $APPLE_TEAM_ID"
          ok=1
          # 1) Submit ALL DMGs first (no --wait) so Apple processes them in parallel
          #    rather than serially (previously the 2nd didn't start until the 1st
          #    timed out). Collect "dmg:submission-id" pairs.
          pairs=""
          for dmg in dist/*.dmg; do
            echo "── Submitting $dmg ($(du -h "$dmg" | cut -f1)) — $(date -u +%T)"
            out=$(xcrun notarytool submit "$dmg" $CREDS --output-format json 2>&1)
            echo "$out"
            sid=$(echo "$out" | node -e "let s='';process.stdin.on('data',d=>s+=d).on('end',()=>{try{process.stdout.write((JSON.parse(s).id)||'')}catch{}})")
            if [ -z "$sid" ]; then echo "✗ submit failed for $dmg"; ok=0; continue; fi
            pairs="$pairs $dmg:$sid"
          done
          # 2) Wait for each (they process concurrently on Apple's side, so total
          #    ≈ the slowest one, not the sum). Then staple the accepted ones.
          for pair in $pairs; do
            dmg=${pair%%:*}; sid=${pair##*:}
            echo "── Waiting on $dmg ($sid) — $(date -u +%T)"
            w=$(xcrun notarytool wait "$sid" $CREDS --timeout 25m 2>&1)
            echo "$w"
            if echo "$w" | grep -q "status: Accepted"; then
              if xcrun stapler staple "$dmg"; then
                echo "✓ Notarized + stapled: $dmg — $(date -u +%T)"
              else
                echo "✗ Stapling failed for $dmg (notarized, but Gatekeeper will need network)"; ok=0
              fi
            else
              echo "✗ Notarization NOT accepted for $dmg — Apple's log:"
              xcrun notarytool log "$sid" $CREDS || echo "(still processing — no log yet)"
              ok=0
            fi
          done
          # Stapling changes DMG bytes; electron-updater verifies latest-mac.yml's
          # sha512, so recompute the hashes/sizes for whatever is on disk now.
          # written into the workspace so require('js-yaml') resolves from node_modules
          cat > _fix-latest-mac.js <<'EOF'
          const fs = require('fs'), crypto = require('crypto'), yaml = require('js-yaml');
          const p = 'dist/latest-mac.yml';
          if (!fs.existsSync(p)) { console.log('no latest-mac.yml — skipping'); process.exit(0); }
          const doc = yaml.load(fs.readFileSync(p, 'utf8'));
          const h = f => crypto.createHash('sha512').update(fs.readFileSync('dist/' + f)).digest('base64');
          for (const f of doc.files || []) {
            if (fs.existsSync('dist/' + f.url)) { f.sha512 = h(f.url); f.size = fs.statSync('dist/' + f.url).size; }
          }
          if (doc.path && fs.existsSync('dist/' + doc.path)) doc.sha512 = h(doc.path);
          fs.writeFileSync(p, yaml.dump(doc, { lineWidth: 0 }));
          console.log('latest-mac.yml hashes updated');
          EOF
          node _fix-latest-mac.js
          rm -f _fix-latest-mac.js
          [ $ok -eq 1 ] || { echo "Notarization incomplete — shipping signed-only DMGs"; exit 1; }

      - name: Upload Mac artifact
        uses: actions/upload-artifact@v4
        with:
          name: JobBot-Mac
          path: |
            dist/*.dmg
            dist/latest-mac.yml

  release:
    needs: [build-windows, build-mac]
    runs-on: ubuntu-latest
    # Publish as long as Windows built — a Mac signing/notarization failure must
    # NOT block the release (and Windows auto-update). Mac assets are included
    # when present. always() lets this run even if build-mac failed.
    if: always() && needs.build-windows.result == 'success' && startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: JobBot-Windows
          path: artifacts

      - name: Download Mac artifact
        uses: actions/download-artifact@v4
        continue-on-error: true   # Mac may have failed/been skipped — release Windows regardless
        with:
          name: JobBot-Mac
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
